services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/smart-leads
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_here}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
