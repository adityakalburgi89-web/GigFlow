server {
    listen 80;
    server_name localhost;

    # Content Security Policy (Issue 12)
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:5000 https://*; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;";

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # SPA Routing Fix (Issue 1)
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
